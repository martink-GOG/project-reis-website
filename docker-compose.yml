# meja02 mei 2025 :
# dockerfile inline, dus geen apart bestand meer nodig
# image keyword verwijderd: dus altijd een build
# php versie 8.0 -> 8.4
# mysql versie 5.7 -> lts (8.x)
name: webapplication2
services:
  web:
    build:
      context: .
      # pipe symbol op volgende regel laten staan!!!
      dockerfile_inline: |
        FROM php:8.4-apache
        RUN docker-php-ext-install pdo pdo_mysql
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
 
  db:
    # Bart beun oplossing voor MAC OS
    # platform: linux/x86_64
    image: mysql:lts
    restart: always
    environment:
    # de HOSTNAME is gelijk aan de servicenaam: "db"
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      # SQL-bestanden in ./database worden bij de eerste keer opstarten
      # automatisch uitgevoerd (alfabetisch volgorde — vandaar 01-, 02-).
      - ./database:/docker-entrypoint-initdb.d:ro
    # ports blijven default  
 
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
 
volumes:
  db_data:
 
